<h2>Signup</h2>

<form method="post">
    {% csrf_token %}
    <input type="text" name="username" placeholder="Username"><br><br>
    <input type="password" name="password" placeholder="Password"><br><br>
    <button type="submit">Signup</button>
</form>

<p>Already have an account? <a href="/login/">Login</a></p>
